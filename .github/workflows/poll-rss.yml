name: Poll US Market (S&P500 + NASDAQ100) & Alerts (no-persist but cached seen)

on:
  schedule:
    - cron: '*/30 * * * *'
    - cron: '0 7 * * *'
  workflow_dispatch: {}

jobs:
  run-poll:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore seen cache
        uses: actions/cache@v4
        with:
          path: .cache
          key: market-seen-v1-${{ runner.os }}
          # allow fallback if key changes in future
          restore-keys: |
            market-seen-v1-

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests pytz beautifulsoup4 lxml

      - name: Run improved poller (cache-aware)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
          TIMEZONE: Europe/Paris
          DAILY_DIGEST_HOUR: '8'
          MAX_TICKERS: '200'      # your updated choice
          THROTTLE_SECONDS: '0.4'
          RECENT_DAYS: '7'        # keep 7 days by default
        run: |
          # ensure cache dir exists (cache action restored it if available)
          mkdir -p .cache
          python main_improved_action.py
