name: Poll US Market (S&P500 + NASDAQ100) & Digest (morning + evening delta)

on:
  schedule:
    # Change these anytime; update the MANUAL_MODE mapping below to match.
    - cron: '0 4 * * *'   # scheduled run intended as MORNING
    - cron: '0 18 * * *'  # scheduled run intended as EVENING
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode for manual trigger: auto | morning | evening'
        required: false
        default: 'morning'
      process_all:
        description: 'Manual run only: process all batches? true | false'
        required: false
        default: 'false'
      max_tickers:
        description: 'Manual run only: batch size'
        required: false
        default: '200'

jobs:
  run-poll:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Restore seen cache
        uses: actions/cache@v4
        with:
          path: .cache
          key: market-seen-v2-${{ runner.os }}
          restore-keys: |
            market-seen-v2-

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests pytz beautifulsoup4 lxml

      - name: Run digest poller
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}

          TIMEZONE: Europe/Paris
          DAILY_DIGEST_HOUR_MORNING: '5'
          DAILY_DIGEST_HOUR_EVENING: '19'

          MAX_TICKERS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.max_tickers || '200' }}
          PROCESS_ALL_BATCHES: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.process_all || 'true' }}

          THROTTLE_SECONDS: '0.4'
          RECENT_DAYS: '2'
          UPCOMING_DAYS: '5'

          # Manual runs use the UI input.
          # Scheduled runs are explicitly mapped from the cron that fired,
          # so you can change cron times later without touching the script logic.
          MANUAL_MODE: >-
            ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.mode ||
                github.event.schedule == '0 4 * * *' && 'morning' ||
                github.event.schedule == '0 18 * * *' && 'evening' ||
                '' }}

        run: |
          mkdir -p .cache
          python main_improved_action.py

      - name: Save seen cache
        uses: actions/cache@v4
        with:
          path: .cache
          key: market-seen-v2-${{ runner.os }}
