name: Poll US Market (S&P500 + NASDAQ100) & Alerts (no-persist)

on:
  schedule:
    # every 30 minutes
    - cron: '*/30 * * * *'
    # daily digest at 08:00 Europe/Paris -> 07:00 UTC (adjust if you need different alignment)
    - cron: '0 7 * * *'
  workflow_dispatch: {}

jobs:
  run-poll:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests pytz beautifulsoup4 lxml

      - name: Run improved poller
        # ensure the script file is named main_improved_action.py in repository root
        env:
          # REQUIRED (Telegram)
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

          # Optional additional channels
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}

          # Tuning (change as desired)
          TIMEZONE: Europe/Paris
          DAILY_DIGEST_HOUR: '8'
          MAX_TICKERS: '200'      # default tickers processed per run (tweakable)
          THROTTLE_SECONDS: '0.4' # pause between feed polls to be polite
        run: |
          python main_improved_action.py
