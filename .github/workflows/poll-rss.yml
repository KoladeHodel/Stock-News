name: Poll US Market (S&P500 + NASDAQ100) & Digest (morning + evening delta)

on:
  schedule:
    - cron: '03 03 * * *'
    - cron: '00 03 * * *'
    - cron: '00 04 * * *'
    - cron: '00 16 * * *'
    - cron: '00 17 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode for manual trigger: auto | morning | evening'
        required: false
        default: 'auto'

jobs:
  run-poll:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Restore seen cache
        uses: actions/cache@v4
        with:
          path: .cache
          key: market-seen-v1-${{ runner.os }}
          restore-keys: |
            market-seen-v1-

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests pytz beautifulsoup4 lxml

      - name: Run digest poller (manual mode support)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
          TIMEZONE: Europe/Paris
          DAILY_DIGEST_HOUR_MORNING: '5'
          DAILY_DIGEST_HOUR_EVENING: '18'
          MAX_TICKERS: '200'
          PROCESS_ALL_BATCHES: 'false'
          THROTTLE_SECONDS: '0.4'
          RECENT_DAYS: '2'
          UPCOMING_DAYS: '5'
          # pass manual mode input to script (will be empty for scheduled runs)
          MANUAL_MODE: ${{ github.event.inputs.mode }}
        run: |
          mkdir -p .cache
          python main_improved_action.py

      - name: Save seen cache
        uses: actions/cache@v4
        with:
          path: .cache
          key: market-seen-v1-${{ runner.os }}
