name: Poll US Market (S&P500 + NASDAQ100) & Digest (morning + evening delta)

on:
  schedule:
    # To handle Europe/Paris DST transitions robustly, run at both possible UTC offsets.
    # These runs are cheap; the script itself only sends when local time is 05:00 or 18:00.
    - cron: '03 03 * * *'   # fallback run (rare) — kept for coverage (safe)
    - cron: '00 03 * * *'   # 03:00 UTC
    - cron: '00 04 * * *'   # 04:00 UTC (covers CET/CEST differences for morning)
    - cron: '00 16 * * *'   # 16:00 UTC
    - cron: '00 17 * * *'   # 17:00 UTC (covers CET/CEST differences for evening)
  workflow_dispatch: {}

jobs:
  run-poll:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore seen cache
        uses: actions/cache@v4
        with:
          path: .cache
          key: market-seen-v1-${{ runner.os }}
          restore-keys: |
            market-seen-v1-

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests pytz beautifulsoup4 lxml

      - name: Run improved digest poller (morning + evening delta)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
          TIMEZONE: Europe/Paris
          DAILY_DIGEST_HOUR_MORNING: '5'
          DAILY_DIGEST_HOUR_EVENING: '18'
          MAX_TICKERS: '200'
          THROTTLE_SECONDS: '0.4'
          RECENT_DAYS: '7'
          UPCOMING_DAYS: '7'
        run: |
          mkdir -p .cache
          python main_improved_action.py

      - name: Save seen cache
        uses: actions/cache@v4
        with:
          path: .cache
          key: market-seen-v1-${{ runner.os }}
